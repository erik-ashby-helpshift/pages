<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpshift Anonymous Launcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f8fafc;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #1e293b;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            padding: 40px;
            text-align: center;
            border: 1px solid #334155;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; color: #38bdf8; }
        .header p { font-size: 14px; color: #94a3b8; margin-bottom: 30px; }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-1px); }
        .btn-primary:disabled { background: #334155; color: #64748b; cursor: wait; }
        
        .status-area {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #0f172a;
            font-size: 13px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }
        .loader {
            border: 2px solid #334155;
            border-top: 2px solid #38bdf8;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Alien Attack Launchpad</h1>
        <p>Helpshift AI Agent Testing Environment (Anonymous)</p>
    </div>

    <div id="launch-ui">
        <button id="btn-main" class="btn btn-primary">Launch Support</button>
        <div class="status-area hidden" id="launch-status">
            <div class="loader"></div> Preparing Helpshift...
        </div>
    </div>
</div>

<script type="module">
    const CONFIG = {
        app: {
            platformId: "sbox-ai-agent-v2-qa_platform_20260219045120603-8366890949b3e76",
            domain: "sbox-ai-agent-v2-qa",
            appId: "ashbys_platform_20260219131402096-74340cad083e005"
        }
    };

    const elements = {
        btnMain: document.getElementById('btn-main'),
        status: document.getElementById('launch-status')
    };

    let hsInitialized = false;

    async function launchAnonymous() {
        elements.btnMain.disabled = true;
        elements.btnMain.textContent = "Launching...";
        elements.status.classList.remove('hidden');

        try {
            if (!hsInitialized) {
                window.helpshiftConfig = {
                    platformId: CONFIG.app.platformId,
                    domain: CONFIG.app.domain,
                    language: 'en'
                };

                await new Promise((resolve) => {
                    !function(t,e){if("function"!=typeof window.Helpshift){var n=function(){n.q.push(arguments)};n.q=[],window.Helpshift=n;var i,a=t.getElementsByTagName("script")[0];i=t.createElement("script"),i.async=!0,i.id=e,i.src="https://webchat.helpshift.com/latest/webChat.js";var o=function(){window.Helpshift("init");resolve()};window.attachEvent?i.attachEvent("onload",o):i.addEventListener("load",o,!1),a.parentNode.insertBefore(i,a)}else{window.Helpshift("update");resolve()}}(document,"hs-chat");
                });

                window.Helpshift('setCustomIssueFields', {
                    "ai_agent": { type: "singleline", value: "care_agent" },
                    "ai_conversation_key": { type: "singleline", value: Math.random().toString(16).slice(2) }
                });

                hsInitialized = true;
            }

            window.Helpshift('open');
            elements.status.innerHTML = '✅ Widget Launched';
            elements.btnMain.textContent = "Support Active";
        } catch (err) {
            elements.status.innerHTML = `❌ Error: ${err.message}`;
            elements.btnMain.disabled = false;
            elements.btnMain.textContent = "Retry Launch";
            console.error(err);
        }
    }

    elements.btnMain.onclick = launchAnonymous;
</script>

</body>
</html>
